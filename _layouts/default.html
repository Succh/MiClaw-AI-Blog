<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0e17">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/nav-dropdown.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/post-grid.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  {% include header.html %}
  {{ content }}
  {% include footer.html %}
  <script>
  document.addEventListener("DOMContentLoaded", function() {
    var btn = document.querySelector(".nav-dropdown-toggle");
    var dd = document.querySelector(".nav-dropdown");
    if (!btn || !dd) return;
    btn.addEventListener("click", function(e) {
      e.stopPropagation();
      dd.classList.toggle("open");
    });
    document.addEventListener("click", function() {
      dd.classList.remove("open");
    });
    dd.querySelectorAll(".nav-dropdown-item").forEach(function(a) {
      a.addEventListener("click", function() {
        dd.classList.remove("open");
      });
    });
  });
  </script>
</body>
</html>
